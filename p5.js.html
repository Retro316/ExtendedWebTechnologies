<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bounding Ball</title>

  <!-- Load p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/addons/p5.sound.js"></script>

</head>

<body style="padding: 20px;">

<style>
html, body {
  margin: 0;
  padding: 0;
}
canvas {
  display: block;
}
</style>

<script>
let x = 50;
let y = 50;
let d = 80;
let diry = 3;
let dirx = 2;
let t = -1;

let r = 255;
let g = 255;
let b = 255;

let pingAry = [];
let ping;

let points = 0;
let rank = ["Noob", "Meh", "Ok", "Nice", "Crazy", "Amazing", "Legendary", "Godly"]

function preload() {
  pingAry = [
    loadSound('Sounds/Ping1.mp3'),
    loadSound('Sounds/Ping2.mp3'),
    loadSound('Sounds/Ping3.mp3'),
    loadSound('Sounds/Ping4.mp3'),
    loadSound('Sounds/Ping5.mp3'),
    loadSound('Sounds/Ping6.mp3')
  ];
}


function setup() {
  createCanvas(windowWidth, windowHeight);
  background(220);
  frameRate(120)
}

function mouseClicked() {
  let distFromCenter = dist(mouseX, mouseY, x, y);

  if (distFromCenter < d) {
    // CLICKED THE CIRCLE
    dirx *= 1.5;
    diry *= 1.5;
    points++;
  }
}

function draw() {
  background(220);
  textSize(36);
  fill(50, 0, 0);
  textFont('Times New Roman');
  if (points < 8)
{
  text(`Speed: ${points} \nRank: ${rank[points]}`, 25, 50);
}
else
{
  text(`Speed: ${points} \nRank: Honored one}`, 25, 50);
}
  fill(r, g, b);

  ellipse(x,y,d,d);
  x += dirx;
  y += diry;

 if(x > windowWidth || x < 0)
{
  //reset
  x = random(50, windowWidth - 50);
  y = random(50, windowHeight - 50);
}
  
  if(y >= windowHeight - d/2){
    r = random(256);
    g = random(256);
    b = random(256);
    fill(r, g, b);
    ping = random(pingAry);
    ping.play();
    diry*=t;
     }
  else if(y <= 0 + d/2){
    r = random(256);
    g = random(256);
    b = random(256);
    fill(r, g, b)
    ping = random(pingAry);
    ping.play();
    diry*=t;
     }
  else if(x >= windowWidth - d/2){
    r = random(256);
    g = random(256);
    b = random(256);
    fill(r, g, b)
    ping = random(pingAry);
    ping.play();
    dirx*=t
  }
  else if(x <= 0 + d/2){
    r = random(256);
    g = random(256);
    b = random(256);
    fill(r, g, b)
    ping = random(pingAry);
    ping.play();
    dirx*=t
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
