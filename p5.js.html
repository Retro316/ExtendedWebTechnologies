<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Bounding Ball</title>

  <!-- Load p5.js -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/addons/p5.sound.js"></script>

</head>

<body style="padding: 20px;">

<style>
html, body {
  margin: 0;
  padding: 0;
}
canvas {
  display: block;
}
</style>

<script>
let x = 50;
let y = 50;
let d = 80;
let diry = 5;
let dirx = 2;
let t = -1;

let pingAry = [];
let ping;

function preload() {
  pingAry = [
    loadSound('Sounds/Ping1.mp3'),
    loadSound('Sounds/Ping2.mp3'),
    loadSound('Sounds/Ping3.mp3'),
    loadSound('Sounds/Ping4.mp3'),
    loadSound('Sounds/Ping5.mp3'),
    loadSound('Sounds/Ping6.mp3')
  ];
}


function setup() {
  createCanvas(windowWidth, windowHeight);
  background(220);
  frameRate(60)
}

function mouseClicked() {
  x = 50;
  y = 50;
}

function draw() {
  ping = loadSound(pingAry[random(5)]);
  background(220);
  ellipse(x,y,d,d);
  x += dirx * mouseX * 0.01;
  y += diry * mouseY * 0.01;
  
  let r = random(256);
  let g = random(256);
  let b = random(256);
  
  if(y >= windowHeight - d/2){
    fill(r, g, b);
    ping = random(pingAry);
    ping.play();
    diry*=t;
     }
  else if(y <= 0 + d/2){
    fill(r, g, b)
    ping = random(pingAry);
    ping.play();
    diry*=t;
     }
  else if(x >= windowWidth - d/2){
    fill(r, g, b)
    ping = random(pingAry);
    ping.play();
    dirx*=t
  }
  else if(x <= 0 + d/2){
    fill(r, g, b)
    ping = random(pingAry);
    ping.play();
    dirx*=t
  }
}

function windowResized() {
  resizeCanvas(windowWidth, windowHeight);
}
</script>

</body>
</html>
